# ═══════════════════════════════════════════════════════════════
# EDARS — Nginx Reverse Proxy Configuration  (BUFFED)
# ═══════════════════════════════════════════════════════════════
# TLS 1.3, HSTS preload, CSP, Brotli/gzip, request ID tracing,
# geo-blocking, request body inspection, bot protection

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # ─── Basic Settings ───────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10k;
    client_body_buffer_size 10k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    server_tokens off;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Gzip Compression ────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ─── Logging ──────────────────────────────────────────────
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct=$upstream_connect_time '
                        'urt=$upstream_response_time '
                        'rid=$upstream_http_x_request_id '
                        'ssl=$ssl_protocol/$ssl_cipher';

    access_log /var/log/nginx/access.log detailed;

    # ─── Rate Limiting Zones ─────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=export_limit:10m rate=2r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Bot / Scanner Detection ─────────────────────────────
    map $http_user_agent $bad_bot {
        default 0;
        ~*sqlmap        1;
        ~*nikto         1;
        ~*nessus        1;
        ~*dirbuster     1;
        ~*gobuster      1;
        ~*nuclei        1;
        ~*masscan       1;
        ~*wfuzz         1;
        ~*hydra         1;
        ~*nmap          1;
        ~*curl/         0;  # Allow curl for API testing
    }

    # ─── Request ID Generation ────────────────────────────────
    map $http_x_request_id $request_id {
        default   $http_x_request_id;
        ""        $request_id;
    }

    # ─── Upstream ─────────────────────────────────────────────
    upstream api_gateway {
        server gateway:3000;
        keepalive 64;
    }

    # ─── HTTP → HTTPS Redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /nginx-health {
            access_log off;
            return 200 '{"status":"healthy","proxy":"nginx"}';
            add_header Content-Type application/json;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server ────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS Configuration ────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_buffer_size 4k;

        # ── Security Headers (comprehensive) ─────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "0" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), screen-wake-lock=(), accelerometer=(), gyroscope=(), magnetometer=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # ── Bot Blocking ─────────────────────────────────────
        if ($bad_bot) {
            return 403;
        }

        # ── Auth endpoints — strict rate limit ───────────────
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";
        }

        # ── Export endpoints — strict rate limit ─────────────
        location /api/v1/exports {
            limit_req zone=export_limit burst=2 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";

            # Export responses may be larger
            proxy_read_timeout    60s;
            proxy_buffer_size     16k;
            proxy_buffers         16 16k;
        }

        # ── Health endpoints — no rate limit ─────────────────
        location /health {
            access_log off;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # ── All other API endpoints ──────────────────────────
        location / {
            limit_req zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Buffers
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ── Block all sensitive paths ────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ ^/(\.env|\.git|docker-compose|node_modules|__pycache__) {
            deny all;
            return 404;
        }

        # ── Deny non-API paths ───────────────────────────────
        location = /favicon.ico { access_log off; return 204; }
        location = /robots.txt  { access_log off; return 200 "User-agent: *\nDisallow: /\n"; }
    }
}
