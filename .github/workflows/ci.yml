name: EDARS CI/CD Pipeline

# ════════════════════════════════════════════════════════════════
# Triggers:
#   - Every push to any branch    → lint + test
#   - Every pull request to main  → lint + test + build images
#   - Merge to main               → lint + test + build + push + deploy staging
# ════════════════════════════════════════════════════════════════

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/edars

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Lint — Node.js (ESLint + Prettier)
  # ──────────────────────────────────────────────────────────────
  lint-node:
    name: Lint — Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Lint — Python (ruff + mypy)
  # ──────────────────────────────────────────────────────────────
  lint-python:
    name: Lint — Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: analytics/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

      - name: Run mypy type checking
        run: mypy . --ignore-missing-imports --strict-optional

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Unit Tests — Node.js (Jest)
  # ──────────────────────────────────────────────────────────────
  test-node:
    name: Tests — Node.js (Jest)
    runs-on: ubuntu-latest
    needs: [lint-node]
    defaults:
      run:
        working-directory: gateway

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest unit tests
        run: npm test -- --coverage --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-production
          JWT_SECRET_LEGACY: ''
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edars_test
          ADMIN_IP_WHITELIST: '127.0.0.1,::1'
          CURRENT_TOS_VERSION: '2026-03'
          CURRENT_PRIVACY_VERSION: '2026-03'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: gateway/coverage
          flags: gateway

  # ──────────────────────────────────────────────────────────────
  # JOB 4: Unit Tests — Python (Pytest)
  # ──────────────────────────────────────────────────────────────
  test-python:
    name: Tests — Python (Pytest)
    runs-on: ubuntu-latest
    needs: [lint-python]
    defaults:
      run:
        working-directory: analytics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: analytics/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Run Pytest
        run: pytest --cov=. --cov-report=xml --cov-report=term -v
        env:
          ENVIRONMENT: test
          SERVICE_TOKEN: ci-test-token
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edars_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: analytics
          flags: analytics

  # ──────────────────────────────────────────────────────────────
  # JOB 5: Build Docker Images
  # Only on PRs to main and pushes to main
  # ──────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-node, test-python]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: gateway
            context: ./gateway
            dockerfile: ./gateway/Dockerfile
          - name: analytics
            context: ./analytics
            dockerfile: ./analytics/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 6: Deploy to Staging
  # Only on merge to main — requires manual approval in GitHub
  # Environments settings → staging → add required reviewer
  # ──────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/edars
            git pull origin main
            docker compose pull
            docker compose up -d --no-build
            docker compose exec -T db psql -U postgres edars -c "SELECT 'DB connection OK';"
            echo "Staging deploy complete: $(date)"
