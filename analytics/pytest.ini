[pytest]
# ── Test discovery ────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Async test mode ───────────────────────────────────────────
# Required for pytest-asyncio to handle async test functions
asyncio_mode = auto

# ── Output ────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ── Custom markers ────────────────────────────────────────────
markers =
    integration: marks tests that require a live DB/Redis (deselect with -m "not integration")
    slow: marks tests that take > 2 seconds

# ── Coverage (when run with --cov) ────────────────────────────
# Run: pytest --cov=. --cov-report=term-missing
