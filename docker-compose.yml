version: "3.9"

services:
  # ─────────────────────────────────────────────
  # NGINX REVERSE PROXY — External Entry Point
  # ─────────────────────────────────────────────
  proxy:
    build: ./proxy
    container_name: edars-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/certs:/etc/nginx/certs:ro
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - external_net
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # API GATEWAY — Authentication & Routing
  # ─────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: edars-gateway
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - ANALYTICS_URL=http://analytics:8000
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - external_net
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "10"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # ANALYTICS ENGINE — Internal Only
  # ─────────────────────────────────────────────
  analytics:
    build: ./analytics
    container_name: edars-analytics
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "10"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # POSTGRESQL 16 — Primary Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: edars-db
    environment:
      POSTGRES_DB: ${DB_NAME:-edars}
      POSTGRES_USER: ${DB_USER:-edars_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "log_statement=ddl"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-edars_admin} -d ${DB_NAME:-edars}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "10"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # REDIS — Cache & Rate Limiting
  # ─────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: edars-cache
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec --tcp-keepalive 60 --timeout 300 --hz 10 --lfu-log-factor 10
    volumes:
      - redis_data:/data
    networks:
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          memory: 128M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PROMETHEUS — Metrics Collection
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: edars-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy" ]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # ALERTMANAGER — Alert Routing
  # ─────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: edars-alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy" ]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  external_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true
