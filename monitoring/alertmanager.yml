# ═══════════════════════════════════════════════════════════════
# Alertmanager Configuration — EDARS
# ═══════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'default'
      repeat_interval: 4h

receivers:
  - name: 'default'
    # Configure your notification channels here:
    # webhook_configs:
    #   - url: 'https://your-webhook-url/alerts'
    #     send_resolved: true

  - name: 'critical'
    # Configure critical alert channels (PagerDuty, SMS, etc.):
    # pagerduty_configs:
    #   - service_key: 'your-pagerduty-key'
    # webhook_configs:
    #   - url: 'https://your-webhook-url/critical-alerts'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service']
